name: Push Live Update (OTA)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-ota:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Angular App
        run: npm run build

      - name: Validate and Package Update
        run: |
          # ตรวจสอบว่ามีไฟล์ที่ Build สำเร็จจริง
          if [ ! -d "dist/app/browser" ]; then
            echo "Error: Build directory not found!"
            exit 1
          fi
          
          # สร้าง Version Info
          echo "{\"version\": \"${{ github.sha }}\", \"timestamp\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\", \"url\": \"https://github.com/${{ github.repository }}/releases/download/ota-latest/update.zip\"}" > version.json
          
          # บีบอัดไฟล์ (ใช้ -j เพื่อไม่ให้ติดโครงสร้างโฟลเดอร์ลึกเกินไป)
          cd dist/app/browser
          zip -r ../../../update.zip .
          cd ../../../
          
          echo "Bundle created successfully."

      - name: Delete Old Release Tag
        run: |
          gh release delete ota-latest --yes || true
          git push origin :refs/tags/ota-latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ota-latest
          name: "Live Update (Latest Build)"
          body: "Auto-generated OTA update for version ${{ github.sha }}"
          files: |
            update.zip
            version.json
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
