name: Push Live Update (OTA)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-ota:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Angular App
        run: npm run build

      - name: Validate and Package Update
        run: |
          # ค้นหา Browser folder โดยไม่ยึดติดกับโครงสร้าง
          BROWSER_DIR=$(find dist -name "browser" -type d | head -n 1)
          if [ -z "$BROWSER_DIR" ]; then
            BROWSER_DIR="dist/app" # Fallback
          fi
          
          echo "Using source directory: $BROWSER_DIR"
          
          # สร้าง Version Info
          VERSION_HASH="${{ github.sha }}"
          SHORT_HASH="${VERSION_HASH:0:7}"
          echo "{\"version\": \"$VERSION_HASH\", \"short_hash\": \"$SHORT_HASH\", \"timestamp\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\", \"url\": \"https://github.com/${{ github.repository }}/releases/download/ota-latest/update.zip\"}" > version.json
          
          # บีบอัดไฟล์
          cd "$BROWSER_DIR"
          zip -r ../../../update.zip .
          cd ../../../
          
          echo "Update package created: update.zip"

      - name: Force Update Release
        run: |
          # ลบ Tag และ Release เก่าออกทุกครั้งเพื่อความสดใหม่
          gh release delete ota-latest --yes || true
          git push origin :refs/tags/ota-latest || true
          
          # สร้าง Release ใหม่พร้อมไฟล์
          gh release create ota-latest \
            --title "Live Update: $(date +'%Y-%m-%d %H:%M')" \
            --notes "Auto-generated OTA bundle for build $GITHUB_SHA" \
            update.zip version.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
