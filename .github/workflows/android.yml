name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Inject API Key
        run: |
          sed -i "s/REPLACE_ME_GEMINI_API_KEY/${{ secrets.GEMINI_API_KEY }}/g" src/environments/environment.ts
        if: env.HAS_SECRET == 'true'
        env:
          HAS_SECRET: ${{ secrets.GEMINI_API_KEY != '' }}

      - name: Build Angular App
        run: |
          npm run build
          # คืนค่า BROWSER_DIR อย่างแม่นยำ
          BROWSER_DIR=$(find dist -name "browser" -type d | head -n 1)
          if [ -z "$BROWSER_DIR" ]; then BROWSER_DIR="dist/app"; fi
          
          # ใช้การ copy แทน symlink เพื่อความรัดกุมในการทำงานของ Capacitor
          rm -rf www
          mkdir www
          cp -r "$BROWSER_DIR"/. www/
          echo "Sync output to ./www completed"

      - name: Capacitor Sync
        run: |
          npx cap add android || echo "Android already added or failed to add"
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew --version

      - name: Build APK (Debug)
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace --no-daemon --console=plain

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
