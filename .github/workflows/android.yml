name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Inject API Key
        if: ${{ secrets.GEMINI_API_KEY != '' }}
        run: |
          # Use | as delimiter to avoid issues with slashes in API keys if any
          sed -i "s|REPLACE_ME_GEMINI_API_KEY|${{ secrets.GEMINI_API_KEY }}|g" src/environments/environment.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Build Angular App
        run: |
          npm run build
          # คืนค่า BROWSER_DIR อย่างแม่นยำ
          BROWSER_DIR=$(find dist -name "browser" -type d | head -n 1)
          if [ -z "$BROWSER_DIR" ]; then 
            BROWSER_DIR=$(find dist -name "*" -type d -maxdepth 2 | head -n 1)
            echo "Fallback: Using $BROWSER_DIR as build directory"
          fi
          
          # ใช้การ copy แทน symlink เพื่อความรัดกุมในการทำงานของ Capacitor
          rm -rf www
          mkdir www
          cp -r "$BROWSER_DIR"/. www/
          echo "Sync output to ./www completed"

      - name: Capacitor Sync
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew --version

      - name: Build APK (Debug)
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace --no-daemon --console=plain

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
